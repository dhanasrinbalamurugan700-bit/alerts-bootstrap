<!DOCTYPE html>
<html lang="en">
<head>
  <title>Alerts Project</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body style="background:linear-gradient(135deg,#74ebd5,#ACB6E5);">

<div class="container mt-5">

  <h2 class="text-center mb-4 text-dark">Bootstrap Alerts</h2>

  <!-- Success Alert -->
  <div class="alert alert-success">
    Success! Your action was completed successfully.
  </div>

  <!-- Info Alert -->
  <div class="alert alert-info">
     Info! This is an informational message.
  </div>

  <!-- Warning Alert -->
  <div class="alert alert-warning">
     Warning! Please check your input.
  </div>

  <!-- Danger Alert -->
  <div class="alert alert-danger">
     Error! Something went wrong.
  </div>

  <!-- Primary Alert -->
  <div class="alert alert-primary">
     Primary alert message.
  </div>

  <!-- Dismissible Alert -->
  <div class="alert alert-success alert-dismissible fade show">
     You can close this alert!
    <button type="button" class="close" data-dismiss="alert">&times;</button>
  </div>

  <!-- Alert with Link -->
  <div class="alert alert-dark">
     Visit <a href="#" class="alert-link">this link</a> for more details.
  </div>

</div>

</body>
</html>
